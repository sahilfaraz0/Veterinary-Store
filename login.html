<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10b981" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vet Store" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=192&auto=format&fit=crop&q=80" />
  <title>System Portal | Veterinary Store & Clinic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              900: '#064e3b'
            }
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css?v=2.3" />
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased min-h-screen flex items-center justify-center p-4 selection:bg-emerald-500 selection:text-white transition-colors duration-300 relative overflow-hidden">

  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="liquid-bg-shape bg-teal-500/25 dark:bg-teal-500/20 w-[680px] h-[680px] rounded-full blur-3xl absolute -top-36 -left-36 animate-liquid-drift-1"></div>
    <div class="liquid-bg-shape bg-indigo-500/25 dark:bg-indigo-500/20 w-[720px] h-[720px] rounded-full blur-3xl absolute top-1/3 -right-44 animate-liquid-drift-2"></div>
    <div class="liquid-bg-shape bg-purple-500/25 dark:bg-purple-500/20 w-[640px] h-[640px] rounded-full blur-3xl absolute -bottom-44 left-1/4 animate-liquid-drift-3"></div>
  </div>

  <button type="button" id="btn-theme-toggle-login" aria-label="Toggle Theme" class="fixed top-6 right-6 z-50 p-3 rounded-2xl glass-dock border border-slate-200/80 dark:border-slate-800 text-slate-700 dark:text-slate-200 hover:text-emerald-600 dark:hover:text-emerald-400 shadow-xl backdrop-blur-2xl transition-all hover:scale-105 active:scale-95 btn-liquid-magnetic">
    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
    <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
  </button>

  <div class="w-full max-w-md mx-auto relative z-10">
    <div id="portal-welcome-screen" class="glass-dock rounded-3xl p-8 sm:p-10 shadow-2xl relative overflow-hidden transition-all duration-500 ease-out transform">
      <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-emerald-500 via-teal-500 to-sky-500"></div>

      <div class="flex flex-col items-center text-center py-6">
        <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-emerald-500 to-teal-700 flex items-center justify-center shadow-xl shadow-emerald-500/30 mb-6 border border-emerald-400/40">
          <i data-lucide="shield-check" class="w-11 h-11 text-white"></i>
        </div>
        <span class="inline-flex items-center gap-1.5 px-3.5 py-1 rounded-full text-[11px] font-bold glass-card text-emerald-700 dark:text-emerald-300 border border-emerald-300/60 dark:border-emerald-700/60 mb-4 tracking-wider uppercase shadow-sm">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          Islamabad Portal
        </span>
        <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-slate-900 dark:text-white mb-2 drop-shadow-sm">Veterinary Store & Clinic</h1>
        <p class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 tracking-wider uppercase mb-8">Authorized Staff Access</p>

        <div class="w-full max-w-xs glass-card rounded-full h-2 overflow-hidden mb-5 border border-slate-300/60 dark:border-slate-700/60 shadow-inner">
          <div id="portal-loading-bar" class="bg-gradient-to-r from-emerald-500 via-teal-500 to-emerald-400 h-full w-0 transition-all duration-[2500ms] ease-linear rounded-full shadow-sm"></div>
        </div>

        <p class="text-xl sm:text-2xl font-black tracking-tight text-slate-900 dark:text-white mb-1 drop-shadow-sm">Welcome</p>
        <p class="text-xs font-semibold text-slate-500 dark:text-slate-400">Initializing Secure Portal...</p>
      </div>
    </div>

    <div id="portal-login-screen" class="hidden opacity-0 scale-95 translate-y-4 glass-dock rounded-3xl p-8 sm:p-10 shadow-2xl relative overflow-hidden transition-all duration-500 ease-out transform">
      <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-emerald-500 via-teal-500 to-sky-500"></div>

      <div class="flex flex-col items-center text-center mb-8 pt-2">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-700 flex items-center justify-center shadow-lg shadow-emerald-500/30 mb-3.5 border border-emerald-400/40">
          <i data-lucide="user-check" class="w-7 h-7 text-white"></i>
        </div>
        <h2 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white drop-shadow-sm">Staff Sign In</h2>
        <p class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 tracking-wider uppercase mt-1">Authorized Personnel Only</p>
      </div>

      <form id="form-login" class="space-y-5">
        <div>
          <label for="login-email" class="block text-xs font-black uppercase tracking-wider text-slate-900 dark:text-slate-100 mb-2">Staff Email Address</label>
          <div class="relative flex items-center">
            <div class="absolute left-1.5 w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white shadow-md shadow-emerald-500/25 pointer-events-none z-10">
              <i data-lucide="mail" class="w-5 h-5"></i>
            </div>
            <input type="email" id="login-email" required placeholder="admin@vetstore.com" class="w-full pl-14 pr-4 py-3.5 rounded-2xl bg-white dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 text-sm font-black text-slate-900 dark:text-white placeholder:text-slate-600 dark:placeholder:text-slate-300 focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all shadow-inner" />
          </div>
        </div>

        <div>
          <label for="login-password" class="block text-xs font-black uppercase tracking-wider text-slate-900 dark:text-slate-100 mb-2">Security Password</label>
          <div class="relative flex items-center">
            <div class="absolute left-1.5 w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white shadow-md shadow-emerald-500/25 pointer-events-none z-10">
              <i data-lucide="lock" class="w-5 h-5"></i>
            </div>
            <input type="password" id="login-password" required placeholder="••••••••••••" class="w-full pl-14 pr-14 py-3.5 rounded-2xl bg-white dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 text-sm font-black text-slate-900 dark:text-white placeholder:text-slate-600 dark:placeholder:text-slate-300 focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all shadow-inner" />
            <button type="button" id="toggle-login-password" aria-label="Toggle password visibility" class="absolute right-1.5 w-9 h-9 rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-700 dark:text-slate-200 hover:bg-emerald-500 hover:text-white transition-all z-10">
              <i data-lucide="eye" id="login-password-eye" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <div id="login-error-box" class="hidden glass-card bg-rose-50/90 dark:bg-rose-950/80 border border-rose-300 dark:border-rose-800 text-rose-700 dark:text-rose-300 text-xs font-semibold p-3.5 rounded-xl flex items-center gap-2.5 shadow-sm">
          <i data-lucide="alert-circle" class="w-4 h-4 text-rose-500 dark:text-rose-400 shrink-0"></i>
          <span id="login-error-text">Authentication failed.</span>
        </div>

        <button type="submit" id="login-submit-btn" class="w-full py-3.5 rounded-2xl bg-gradient-to-r from-emerald-600 via-teal-600 to-emerald-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold text-sm shadow-xl shadow-emerald-600/30 flex items-center justify-center gap-2.5 transition-all transform active:scale-[0.98] btn-liquid-magnetic">
          <i data-lucide="log-in" class="w-4 h-4"></i>
          <span>Sign In to Portal</span>
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-300/40 dark:border-slate-700/40 text-center">
        <p class="text-[11px] font-medium text-slate-500 dark:text-slate-400 flex items-center justify-center gap-1.5">
          <i data-lucide="lock" class="w-3.5 h-3.5 text-emerald-500"></i>
          <span>256-Bit Encrypted Supabase Connection</span>
        </p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2.5 pointer-events-none max-w-sm w-full"></div>

  <script src="env.js"></script>
  <script src="js/login.js?v=2.3"></script>
  <script>
    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
</body>
</html>
